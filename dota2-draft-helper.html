<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skogix Dota 2 Draft Helper</title>
<style>
:root {
  --bg: #1a1a2e;
  --bg2: #16213e;
  --bg3: #0f3460;
  --accent: #e94560;
  --gold: #f5a623;
  --green: #4ade80;
  --red: #f87171;
  --text: #e0e0e0;
  --text-dim: #8899aa;
  --str: #ef4444;
  --agi: #22c55e;
  --int: #3b82f6;
  --all: #eab308;
  --radiant: #92db4a;
  --dire: #c23c2a;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* Header */
.header {
  background: var(--bg2);
  padding: 12px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 2px solid var(--bg3);
  flex-wrap: wrap;
  gap: 8px;
}
.header-left h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(135deg, var(--accent), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-left .subtitle { font-size: 12px; color: var(--text-dim); }
.player-badge {
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--bg);
  border-radius: 10px;
  padding: 8px 16px;
}
.player-badge img { width: 36px; height: 36px; border-radius: 50%; }
.player-badge .name { font-weight: 700; font-size: 14px; }
.player-badge .stats { font-size: 11px; color: var(--text-dim); }
.player-badge .wr-good { color: var(--green); }
.player-badge .wr-bad { color: var(--red); }

/* Layout */
.main {
  display: grid;
  grid-template-columns: 280px 1fr 280px;
  gap: 16px;
  padding: 16px;
  max-width: 1600px;
  margin: 0 auto;
  min-height: calc(100vh - 60px);
}
@media (max-width: 1100px) {
  .main { grid-template-columns: 1fr; }
}

/* Side panels */
.side-panel {
  display: flex;
  flex-direction: column;
  gap: 12px;
}

/* Team panels */
.team-panel {
  background: var(--bg2);
  border-radius: 12px;
  padding: 14px;
  border: 2px solid transparent;
}
.team-panel.radiant { border-color: var(--radiant); }
.team-panel.dire { border-color: var(--dire); }
.team-label {
  font-size: 13px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.team-label.radiant { color: var(--radiant); }
.team-label.dire { color: var(--dire); }
.team-slots { display: flex; flex-direction: column; gap: 6px; }
.team-slot {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--bg);
  border-radius: 8px;
  padding: 6px 8px;
  min-height: 44px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.team-slot:hover { background: var(--bg3); }
.team-slot img { width: 48px; height: 27px; border-radius: 4px; object-fit: cover; }
.team-slot .hero-name { font-size: 12px; font-weight: 600; }
.team-slot .hero-wr { font-size: 10px; color: var(--text-dim); }
.team-slot .remove-btn {
  position: absolute; right: 6px; top: 50%; transform: translateY(-50%);
  background: var(--accent); border: none; color: white;
  width: 18px; height: 18px; border-radius: 50%; cursor: pointer; font-size: 11px;
  display: none; align-items: center; justify-content: center;
}
.team-slot:hover .remove-btn { display: flex; }
.empty-slot { color: var(--text-dim); font-size: 11px; font-style: italic; }

/* Your Pool panel */
.pool-panel {
  background: var(--bg2);
  border-radius: 12px;
  padding: 14px;
  border: 1px solid var(--bg3);
}
.pool-panel h3 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--gold);
  margin-bottom: 8px;
}
.pool-list { display: flex; flex-direction: column; gap: 3px; }
.pool-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 4px 6px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 11px;
  transition: all 0.15s;
  position: relative;
}
.pool-item:hover { background: var(--bg3); }
.pool-item.picked { opacity: 0.3; }
.pool-item img { width: 32px; height: 18px; border-radius: 3px; object-fit: cover; }
.pool-item .pool-wr { margin-left: auto; font-weight: 700; font-size: 10px; }
.pool-item .pool-games { font-size: 9px; color: var(--text-dim); margin-left: 4px; }
.pool-item .comfort {
  position: absolute; left: -2px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 70%; border-radius: 2px;
}

/* Recommendations */
.recommendations {
  margin-top: 12px;
  padding-top: 10px;
  border-top: 1px solid var(--bg3);
}
.recommendations h3 {
  font-size: 11px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.rec-list { display: flex; flex-direction: column; gap: 3px; }
.rec-item {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 6px; border-radius: 6px; cursor: pointer;
  font-size: 11px; transition: all 0.15s;
}
.rec-item:hover { background: var(--bg3); }
.rec-item img { width: 28px; height: 16px; border-radius: 3px; object-fit: cover; }
.rec-item .adv { margin-left: auto; font-weight: 700; font-size: 10px; }
.rec-item .adv.good { color: var(--green); }
.rec-item .adv.bad { color: var(--red); }
.rec-item .in-pool {
  font-size: 8px;
  background: var(--gold);
  color: #000;
  padding: 1px 4px;
  border-radius: 3px;
  font-weight: 800;
}

/* Center: Hero Grid */
.center-panel { min-width: 0; }
.controls {
  display: flex; gap: 8px; margin-bottom: 10px; flex-wrap: wrap; align-items: center;
}
.search-box {
  flex: 1; min-width: 180px; padding: 7px 12px;
  background: var(--bg2); border: 1px solid var(--bg3);
  border-radius: 8px; color: var(--text); font-size: 13px; outline: none;
}
.search-box:focus { border-color: var(--accent); }
.filter-btn {
  padding: 5px 12px; background: var(--bg2); border: 1px solid var(--bg3);
  border-radius: 8px; color: var(--text-dim); cursor: pointer; font-size: 11px; transition: all 0.15s;
}
.filter-btn:hover, .filter-btn.active { background: var(--bg3); color: var(--text); border-color: var(--accent); }
.filter-btn.attr-str.active { border-color: var(--str); color: var(--str); }
.filter-btn.attr-agi.active { border-color: var(--agi); color: var(--agi); }
.filter-btn.attr-int.active { border-color: var(--int); color: var(--int); }
.filter-btn.attr-all.active { border-color: var(--all); color: var(--all); }
.filter-btn.pool-filter.active { border-color: var(--gold); color: var(--gold); }

.team-pick-toggle { display: flex; gap: 4px; margin-bottom: 10px; }
.pick-btn {
  padding: 5px 14px; border-radius: 8px; border: 2px solid transparent;
  cursor: pointer; font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; background: var(--bg2); color: var(--text-dim); transition: all 0.15s;
}
.pick-btn.radiant.active { border-color: var(--radiant); color: var(--radiant); background: rgba(146,219,74,0.1); }
.pick-btn.dire.active { border-color: var(--dire); color: var(--dire); background: rgba(194,60,42,0.1); }
.pick-btn:hover { background: var(--bg3); }

.hero-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(72px, 1fr));
  gap: 5px;
}
.hero-card {
  position: relative; border-radius: 6px; overflow: hidden;
  cursor: pointer; transition: all 0.15s; border: 2px solid transparent;
  aspect-ratio: 16/9;
}
.hero-card:hover { transform: scale(1.08); z-index: 2; border-color: var(--accent); }
.hero-card img { width: 100%; height: 100%; object-fit: cover; display: block; }
.hero-card .overlay {
  position: absolute; bottom: 0; left: 0; right: 0;
  background: linear-gradient(transparent, rgba(0,0,0,0.85));
  padding: 2px 4px; font-size: 9px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.hero-card.picked-radiant { border-color: var(--radiant); opacity: 0.4; }
.hero-card.picked-dire { border-color: var(--dire); opacity: 0.4; }
.hero-card.picked-radiant:hover, .hero-card.picked-dire:hover { transform: none; cursor: default; }

/* Personal WR indicator on cards */
.hero-card .personal-wr {
  position: absolute; top: 2px; left: 2px;
  font-size: 8px; font-weight: 800; padding: 1px 3px; border-radius: 3px;
  display: none;
}
.hero-card .personal-wr.show { display: block; }
.hero-card .personal-wr.good { background: rgba(74,222,128,0.85); color: #000; }
.hero-card .personal-wr.bad { background: rgba(248,113,113,0.85); color: #000; }
.hero-card .personal-wr.neutral { background: rgba(255,255,255,0.5); color: #000; }

.hero-card .adv-badge {
  position: absolute; top: 2px; right: 2px;
  font-size: 8px; font-weight: 800; padding: 1px 3px; border-radius: 3px;
  display: none;
}
.hero-card .adv-badge.show { display: block; }
.hero-card .adv-badge.good { background: rgba(74,222,128,0.9); color: #000; }
.hero-card .adv-badge.bad { background: rgba(248,113,113,0.9); color: #000; }

/* Gold border for heroes in your pool */
.hero-card.in-pool { border-color: rgba(245,166,35,0.4); }
.hero-card.in-pool:hover { border-color: var(--gold); }

/* Hero Detail Modal */
.modal-overlay {
  display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7); z-index: 100;
  justify-content: center; align-items: center; padding: 20px;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--bg2); border-radius: 16px; padding: 24px;
  max-width: 720px; width: 100%; max-height: 85vh; overflow-y: auto;
  position: relative; border: 2px solid var(--bg3);
}
.modal-close {
  position: absolute; top: 12px; right: 16px;
  background: none; border: none; color: var(--text-dim); font-size: 24px; cursor: pointer;
}
.modal-close:hover { color: var(--text); }
.modal-header { display: flex; align-items: center; gap: 16px; margin-bottom: 16px; }
.modal-header img { width: 128px; height: 72px; border-radius: 8px; object-fit: cover; }
.modal-header h2 { font-size: 22px; }
.modal-header .hero-meta { font-size: 12px; color: var(--text-dim); margin-top: 4px; }

/* Personal stats in modal */
.personal-stats {
  background: linear-gradient(135deg, rgba(245,166,35,0.1), rgba(233,69,96,0.1));
  border: 1px solid var(--gold);
  border-radius: 10px;
  padding: 12px;
  margin-bottom: 16px;
}
.personal-stats h3 {
  font-size: 11px; text-transform: uppercase; letter-spacing: 1px;
  color: var(--gold); margin-bottom: 8px;
}
.personal-stats-grid {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px;
}
.ps-item { text-align: center; }
.ps-item .ps-label { font-size: 9px; text-transform: uppercase; color: var(--text-dim); }
.ps-item .ps-value { font-size: 18px; font-weight: 700; margin-top: 2px; }

.stat-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
  gap: 8px; margin-bottom: 16px;
}
.stat-card { background: var(--bg); border-radius: 8px; padding: 8px; text-align: center; }
.stat-card .stat-label { font-size: 9px; text-transform: uppercase; color: var(--text-dim); letter-spacing: 1px; }
.stat-card .stat-value { font-size: 18px; font-weight: 700; margin-top: 2px; }

.matchup-section h3 {
  font-size: 13px; margin-bottom: 8px; color: var(--text-dim);
  text-transform: uppercase; letter-spacing: 1px;
}
.matchup-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.matchup-list { display: flex; flex-direction: column; gap: 3px; }
.matchup-item {
  display: flex; align-items: center; gap: 8px;
  padding: 4px 8px; border-radius: 6px; font-size: 11px; background: var(--bg);
}
.matchup-item img { width: 28px; height: 16px; border-radius: 3px; object-fit: cover; }
.matchup-item .mu-adv { margin-left: auto; font-weight: 700; font-size: 10px; }

.spinner {
  display: inline-block; width: 14px; height: 14px;
  border: 2px solid var(--text-dim); border-top-color: var(--accent);
  border-radius: 50%; animation: spin 0.6s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-text { color: var(--text-dim); font-size: 11px; display: flex; align-items: center; gap: 6px; }

.clear-btn {
  padding: 3px 8px; background: var(--accent); border: none;
  border-radius: 6px; color: white; cursor: pointer; font-size: 10px; font-weight: 600;
}
.clear-btn:hover { opacity: 0.8; }

/* Tab bar for pool panel */
.tab-bar { display: flex; gap: 2px; margin-bottom: 8px; }
.tab-btn {
  flex: 1; padding: 4px 8px; background: var(--bg); border: none;
  border-radius: 6px; color: var(--text-dim); cursor: pointer; font-size: 10px;
  font-weight: 600; text-transform: uppercase; transition: all 0.15s;
}
.tab-btn.active { background: var(--bg3); color: var(--text); }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <h1>Skogix Draft Helper</h1>
    <div class="subtitle">Personalized counter picks & recommendations</div>
  </div>
  <div class="player-badge">
    <img src="https://avatars.steamstatic.com/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_medium.jpg" alt="Skogix">
    <div>
      <div class="name">Skogix</div>
      <div class="stats">1,577W / 1,762L &middot; <span id="overall-wr">47.2%</span></div>
    </div>
  </div>
</div>

<div class="main">
  <!-- Left: Radiant + Your Pool -->
  <div class="side-panel">
    <div class="team-panel radiant">
      <div class="team-label radiant">
        <span>Radiant</span>
        <button class="clear-btn" onclick="clearTeam('radiant')">Clear</button>
      </div>
      <div class="team-slots" id="radiant-slots"></div>
      <div class="recommendations" id="radiant-recs">
        <h3>Suggested for you</h3>
        <div class="rec-list" id="radiant-rec-list">
          <div class="loading-text">Pick enemy heroes to see suggestions</div>
        </div>
      </div>
    </div>
    <div class="pool-panel">
      <h3>Your Hero Pool</h3>
      <div class="tab-bar">
        <button class="tab-btn active" onclick="setPoolTab('best')">Best</button>
        <button class="tab-btn" onclick="setPoolTab('most')">Most Played</button>
        <button class="tab-btn" onclick="setPoolTab('recent')">Recent</button>
      </div>
      <div class="pool-list" id="pool-list"></div>
    </div>
  </div>

  <!-- Center: Hero Grid -->
  <div class="center-panel">
    <div class="controls">
      <input type="text" class="search-box" id="search" placeholder="Search heroes...">
      <button class="filter-btn attr-str" data-attr="str" onclick="toggleAttr(this)">STR</button>
      <button class="filter-btn attr-agi" data-attr="agi" onclick="toggleAttr(this)">AGI</button>
      <button class="filter-btn attr-int" data-attr="int" onclick="toggleAttr(this)">INT</button>
      <button class="filter-btn attr-all" data-attr="all" onclick="toggleAttr(this)">UNI</button>
      <button class="filter-btn pool-filter" id="pool-filter-btn" onclick="togglePoolFilter()">MY POOL</button>
    </div>
    <div class="team-pick-toggle">
      <button class="pick-btn radiant active" id="pick-radiant" onclick="setPickTeam('radiant')">Pick Radiant</button>
      <button class="pick-btn dire" id="pick-dire" onclick="setPickTeam('dire')">Pick Dire</button>
    </div>
    <div class="hero-grid" id="hero-grid"></div>
  </div>

  <!-- Right: Dire + Recs -->
  <div class="side-panel">
    <div class="team-panel dire">
      <div class="team-label dire">
        <span>Dire</span>
        <button class="clear-btn" onclick="clearTeam('dire')">Clear</button>
      </div>
      <div class="team-slots" id="dire-slots"></div>
      <div class="recommendations" id="dire-recs">
        <h3>Suggested for you</h3>
        <div class="rec-list" id="dire-rec-list">
          <div class="loading-text">Pick enemy heroes to see suggestions</div>
        </div>
      </div>
    </div>
    <div class="pool-panel">
      <h3>Avoid (low WR)</h3>
      <div class="pool-list" id="avoid-list"></div>
    </div>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('show')">&times;</button>
    <div id="modal-content"></div>
  </div>
</div>

5427170},{"id":86,"g":1,"w":0,"lp":1409153562},{"id":87,"g":1,"w":0,"lp":1544124674},{"id":89,"g":1,"w":0,"lp":1363729107},{"id":90,"g":1,"w":1,"lp":1538691258},{"id":91,"g":1,"w":1,"lp":1394807360},{"id":109,"g":1,"w":0,"lp":1406127439},{"id":119,"g":1,"w":0,"lp":1707771002},{"id":129,"g":1,"w":0,"lp":1697861229},{"id":155,"g":1,"w":0,"lp":1766725867}];

// ====== State ======
let heroes = HEROES;
let heroMap = {};
let playerMap = {};
let matchupCache = {};
let activeAttr = null;
let poolFilterActive = false;
let pickTeam = 'radiant';
let teams = { radiant: [], dire: [] };
let poolTab = 'best';

const API_BASE = location.hostname === 'localhost' || location.protocol === 'file:'
  ? 'https://api.opendota.com' : '';

// ====== Init ======
async function init() {
  heroMap = {};
  heroes.forEach(h => heroMap[h.id] = h);

  // Build player hero map
  playerMap = {};
  PLAYER_HEROES.forEach(ph => {
    playerMap[ph.id] = { games: ph.g, wins: ph.w, wr: ph.g > 0 ? Math.round(ph.w / ph.g * 1000) / 10 : 0, lastPlayed: ph.lp };
  });

  // Try live stats
  try {
    const res = await fetch(API_BASE + '/api/heroStats');
    if (res.ok) {
      const live = await res.json();
      const liveMap = {};
      live.forEach(h => {
        const tp = [1,2,3,4,5,6,7].reduce((s,i) => s + (h[i+'_pick']||0), 0);
        const tw = [1,2,3,4,5,6,7].reduce((s,i) => s + (h[i+'_win']||0), 0);
        liveMap[h.id] = { winRate: tp > 0 ? Math.round(tw/tp*1000)/10 : 50, totalPicks: tp };
      });
      heroes = heroes.map(h => ({...h, winRate: liveMap[h.id]?.winRate ?? h.winRate, totalPicks: liveMap[h.id]?.totalPicks ?? h.totalPicks}));
      heroMap = {};
      heroes.forEach(h => heroMap[h.id] = h);
    }
  } catch {}

  renderGrid();
  renderTeams();
  renderPool();
  renderAvoid();
  document.getElementById('search').addEventListener('input', renderGrid);
}

// ====== Pool Panel ======
function setPoolTab(tab) {
  poolTab = tab;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  renderPool();
}

function renderPool() {
  const el = document.getElementById('pool-list');
  let poolHeroes = PLAYER_HEROES.filter(ph => ph.g >= 10 && heroMap[ph.id]);

  if (poolTab === 'best') {
    poolHeroes = poolHeroes.filter(ph => ph.g >= 15).sort((a,b) => (b.w/b.g) - (a.w/a.g));
  } else if (poolTab === 'most') {
    poolHeroes.sort((a,b) => b.g - a.g);
  } else {
    poolHeroes.sort((a,b) => b.lp - a.lp);
  }

  const picked = new Set([...teams.radiant, ...teams.dire]);
  el.innerHTML = poolHeroes.slice(0, 12).map(ph => {
    const h = heroMap[ph.id];
    const wr = (ph.w / ph.g * 100).toFixed(1);
    const wrColor = wr >= 55 ? 'var(--green)' : wr < 45 ? 'var(--red)' : 'var(--text)';
    const cls = picked.has(ph.id) ? 'pool-item picked' : 'pool-item';
    return `<div class="${cls}" onclick="heroClick(${ph.id})" oncontextmenu="heroRightClick(event, ${ph.id})">
      <img src="${h.img}" alt="${h.name}">
      <span>${h.name}</span>
      <span class="pool-wr" style="color:${wrColor}">${wr}%</span>
      <span class="pool-games">${ph.g}g</span>
    </div>`;
  }).join('');
}

function renderAvoid() {
  const el = document.getElementById('avoid-list');
  const avoidHeroes = PLAYER_HEROES
    .filter(ph => ph.g >= 15 && heroMap[ph.id] && (ph.w / ph.g) < 0.42)
    .sort((a,b) => (a.w/a.g) - (b.w/b.g));

  el.innerHTML = avoidHeroes.slice(0, 8).map(ph => {
    const h = heroMap[ph.id];
    const wr = (ph.w / ph.g * 100).toFixed(1);
    return `<div class="pool-item" oncontextmenu="heroRightClick(event, ${ph.id})">
      <img src="${h.img}" alt="${h.name}">
      <span>${h.name}</span>
      <span class="pool-wr" style="color:var(--red)">${wr}%</span>
      <span class="pool-games">${ph.g}g</span>
    </div>`;
  }).join('');
}

// ====== Render Hero Grid ======
function renderGrid() {
  const query = document.getElementById('search').value.toLowerCase();
  const grid = document.getElementById('hero-grid');
  const filtered = heroes.filter(h => {
    if (query && !h.name.toLowerCase().includes(query)) return false;
    if (activeAttr && h.attr !== activeAttr) return false;
    if (poolFilterActive && (!playerMap[h.id] || playerMap[h.id].games < 10)) return false;
    return true;
  });

  grid.innerHTML = filtered.map(h => {
    const pickedR = teams.radiant.includes(h.id);
    const pickedD = teams.dire.includes(h.id);
    const cls = pickedR ? 'picked-radiant' : pickedD ? 'picked-dire' : '';
    const inPool = playerMap[h.id] && playerMap[h.id].games >= 10;
    const poolCls = inPool && !pickedR && !pickedD ? 'in-pool' : '';

    // Personal WR badge
    let wrBadge = '';
    if (playerMap[h.id] && playerMap[h.id].games >= 10) {
      const wr = playerMap[h.id].wr;
      const wrCls = wr >= 55 ? 'good' : wr < 45 ? 'bad' : 'neutral';
      wrBadge = `<div class="personal-wr show ${wrCls}">${wr}%</div>`;
    }

    return `<div class="hero-card ${cls} ${poolCls}" data-id="${h.id}"
      onclick="heroClick(${h.id})" oncontextmenu="heroRightClick(event, ${h.id})">
      <img src="${h.img}" alt="${h.name}" loading="lazy">
      <div class="overlay">${h.name}</div>
      ${wrBadge}
      <div class="adv-badge" id="adv-${h.id}"></div>
    </div>`;
  }).join('');

  updateAdvBadges();
}

// ====== Pool filter ======
function togglePoolFilter() {
  poolFilterActive = !poolFilterActive;
  document.getElementById('pool-filter-btn').classList.toggle('active', poolFilterActive);
  renderGrid();
}

// ====== Hero Click / Right-click ======
function heroClick(id) {
  if (teams.radiant.includes(id) || teams.dire.includes(id)) return;
  if (teams[pickTeam].length >= 5) return;
  teams[pickTeam].push(id);
  renderGrid();
  renderTeams();
  renderPool();
  fetchMatchups();
}
function heroRightClick(e, id) { e.preventDefault(); showHeroDetail(id); }

// ====== Team rendering ======
function renderTeams() {
  ['radiant', 'dire'].forEach(team => {
    const container = document.getElementById(team + '-slots');
    let html = '';
    for (let i = 0; i < 5; i++) {
      if (teams[team][i]) {
        const h = heroMap[teams[team][i]];
        const ph = playerMap[h.id];
        const wrText = ph && ph.games >= 5 ? `Your: ${ph.wr}% (${ph.games}g)` : `Global: ${h.winRate}%`;
        html += `<div class="team-slot">
          <img src="${h.img}" alt="${h.name}">
          <div>
            <div class="hero-name">${h.name}</div>
            <div class="hero-wr">${wrText}</div>
          </div>
          <button class="remove-btn" onclick="removeHero('${team}', ${i})">&times;</button>
        </div>`;
      } else {
        html += `<div class="team-slot"><span class="empty-slot">Pick ${i+1}</span></div>`;
      }
    }
    container.innerHTML = html;
  });
}

function removeHero(team, idx) { teams[team].splice(idx, 1); renderGrid(); renderTeams(); renderPool(); fetchMatchups(); }
function clearTeam(team) { teams[team] = []; renderGrid(); renderTeams(); renderPool(); fetchMatchups(); }

// ====== Filters ======
function toggleAttr(btn) {
  const attr = btn.dataset.attr;
  if (activeAttr === attr) { activeAttr = null; btn.classList.remove('active'); }
  else { document.querySelectorAll('.filter-btn[data-attr]').forEach(b => b.classList.remove('active')); activeAttr = attr; btn.classList.add('active'); }
  renderGrid();
}
function setPickTeam(team) {
  pickTeam = team;
  document.getElementById('pick-radiant').classList.toggle('active', team === 'radiant');
  document.getElementById('pick-dire').classList.toggle('active', team === 'dire');
  updateAdvBadges();
}

// ====== Matchup data ======
async function getMatchups(heroId) {
  if (matchupCache[heroId]) return matchupCache[heroId];
  try {
    const res = await fetch(`${API_BASE}/api/heroes/${heroId}/matchups`);
    if (!res.ok) return [];
    const data = await res.json();
    matchupCache[heroId] = data;
    return data;
  } catch { return []; }
}

async function fetchMatchups() {
  await Promise.all([updateRecommendations('radiant'), updateRecommendations('dire')]);
  updateAdvBadges();
}

async function updateRecommendations(team) {
  const otherTeam = team === 'radiant' ? 'dire' : 'radiant';
  const enemies = teams[otherTeam];
  const listEl = document.getElementById(team + '-rec-list');

  if (enemies.length === 0) {
    listEl.innerHTML = '<div class="loading-text">Pick enemy heroes to see suggestions</div>';
    return;
  }
  listEl.innerHTML = '<div class="loading-text"><span class="spinner"></span> Calculating...</div>';

  const allMatchups = await Promise.all(enemies.map(id => getMatchups(id)));
  const scores = {};
  allMatchups.forEach(matchups => {
    matchups.forEach(m => {
      if (!scores[m.hero_id]) scores[m.hero_id] = { total: 0, count: 0 };
      const wr = m.games_played > 50 ? (m.wins / m.games_played - 0.5) * 100 : 0;
      scores[m.hero_id].total += wr;
      scores[m.hero_id].count++;
    });
  });

  const picked = new Set([...teams.radiant, ...teams.dire]);
  let ranked = Object.entries(scores)
    .filter(([id]) => !picked.has(Number(id)) && heroMap[Number(id)])
    .map(([id, s]) => {
      const hid = Number(id);
      const ph = playerMap[hid];
      // Boost score for heroes in player pool with good WR
      let boost = 0;
      if (ph && ph.games >= 15 && ph.wr >= 50) boost = (ph.wr - 50) * 0.3 + (Math.min(ph.games, 100) / 100) * 2;
      return { id: hid, adv: s.total, boost, score: s.total + boost, inPool: ph && ph.games >= 10 };
    })
    .sort((a, b) => b.score - a.score);

  const top = ranked.slice(0, 10);
  if (top.length === 0) { listEl.innerHTML = '<div class="loading-text">No data available</div>'; return; }

  listEl.innerHTML = top.map(r => {
    const h = heroMap[r.id];
    const advStr = r.adv >= 0 ? `+${r.adv.toFixed(1)}%` : `${r.adv.toFixed(1)}%`;
    const cls = r.adv >= 0 ? 'good' : 'bad';
    const poolBadge = r.inPool ? '<span class="in-pool">YOU</span>' : '';
    return `<div class="rec-item" onclick="heroClick(${h.id})" oncontextmenu="heroRightClick(event, ${h.id})">
      <img src="${h.img}" alt="${h.name}">
      <span>${h.name}</span>
      ${poolBadge}
      <span class="adv ${cls}">${advStr}</span>
    </div>`;
  }).join('');
}

// ====== Advantage badges ======
function updateAdvBadges() {
  const otherTeam = pickTeam === 'radiant' ? 'dire' : 'radiant';
  const enemies = teams[otherTeam];
  const picked = new Set([...teams.radiant, ...teams.dire]);
  heroes.forEach(h => {
    const badge = document.getElementById('adv-' + h.id);
    if (!badge) return;
    badge.classList.remove('show', 'good', 'bad');
    if (picked.has(h.id) || enemies.length === 0) return;
    let totalAdv = 0, count = 0;
    enemies.forEach(eid => {
      const matchups = matchupCache[eid];
      if (!matchups) return;
      const m = matchups.find(x => x.hero_id === h.id);
      if (m && m.games_played > 50) { totalAdv += (m.wins / m.games_played - 0.5) * 100; count++; }
    });
    if (count > 0 && Math.abs(totalAdv) > 1) {
      badge.classList.add('show', totalAdv > 0 ? 'good' : 'bad');
      badge.textContent = totalAdv > 0 ? `+${totalAdv.toFixed(0)}` : totalAdv.toFixed(0);
    }
  });
}

// ====== Hero Detail Modal ======
async function showHeroDetail(id) {
  const h = heroMap[id];
  if (!h) return;
  const modal = document.getElementById('modal-overlay');
  const content = document.getElementById('modal-content');
  const attrColor = h.attr === 'str' ? 'var(--str)' : h.attr === 'agi' ? 'var(--agi)' : h.attr === 'int' ? 'var(--int)' : 'var(--all)';
  const ph = playerMap[id];

  let personalHtml = '';
  if (ph && ph.games > 0) {
    const wrColor = ph.wr >= 55 ? 'var(--green)' : ph.wr < 45 ? 'var(--red)' : 'var(--text)';
    const lastPlayed = ph.lastPlayed > 0 ? new Date(ph.lastPlayed * 1000).toLocaleDateString() : 'Never';
    personalHtml = `<div class="personal-stats">
      <h3>Your Stats</h3>
      <div class="personal-stats-grid">
        <div class="ps-item"><div class="ps-label">Games</div><div class="ps-value">${ph.games}</div></div>
        <div class="ps-item"><div class="ps-label">Win Rate</div><div class="ps-value" style="color:${wrColor}">${ph.wr}%</div></div>
        <div class="ps-item"><div class="ps-label">Last Played</div><div class="ps-value" style="font-size:13px">${lastPlayed}</div></div>
      </div>
    </div>`;
  }

  content.innerHTML = `
    <div class="modal-header">
      <img src="${h.img}" alt="${h.name}">
      <div>
        <h2>${h.name}</h2>
        <div class="hero-meta">
          <span style="color:${attrColor};font-weight:700">${h.attr.toUpperCase()}</span> &middot;
          ${h.attack} &middot; ${h.roles.join(', ')}
        </div>
      </div>
    </div>
    ${personalHtml}
    <div class="stat-grid">
      <div class="stat-card"><div class="stat-label">Global WR</div><div class="stat-value" style="color:${h.winRate >= 50 ? 'var(--green)' : 'var(--red)'}">${h.winRate}%</div></div>
      <div class="stat-card"><div class="stat-label">STR</div><div class="stat-value" style="color:var(--str)">${h.baseStr} <small>+${h.strGain}</small></div></div>
      <div class="stat-card"><div class="stat-label">AGI</div><div class="stat-value" style="color:var(--agi)">${h.baseAgi} <small>+${h.agiGain}</small></div></div>
      <div class="stat-card"><div class="stat-label">INT</div><div class="stat-value" style="color:var(--int)">${h.baseInt} <small>+${h.intGain}</small></div></div>
      <div class="stat-card"><div class="stat-label">Speed</div><div class="stat-value">${h.moveSpeed}</div></div>
      <div class="stat-card"><div class="stat-label">Armor</div><div class="stat-value">${h.armor}</div></div>
    </div>
    <div class="matchup-section">
      <h3>Matchups</h3>
      <div id="matchup-loading" class="loading-text"><span class="spinner"></span> Loading...</div>
      <div class="matchup-grid" id="matchup-grid" style="display:none"></div>
    </div>
  `;

  modal.classList.add('show');

  const matchups = await getMatchups(id);
  const loading = document.getElementById('matchup-loading');
  const grid = document.getElementById('matchup-grid');
  if (matchups.length === 0) { loading.textContent = 'No matchup data available'; return; }
  const withWr = matchups.filter(m => m.games_played > 100 && heroMap[m.hero_id]).map(m => ({...m, wr: m.wins / m.games_played}));
  const best = [...withWr].sort((a,b) => b.wr - a.wr).slice(0, 8);
  const worst = [...withWr].sort((a,b) => a.wr - b.wr).slice(0, 8);

  function renderMU(items, label) {
    return `<div>
      <h3 style="color:${label==='Best'?'var(--green)':'var(--red)'};font-size:12px;margin-bottom:6px">${label} against</h3>
      <div class="matchup-list">${items.map(m => {
        const hero = heroMap[m.hero_id];
        const adv = ((m.wr - 0.5) * 100).toFixed(1);
        return `<div class="matchup-item"><img src="${hero.img}" alt="${hero.name}"><span>${hero.name}</span><span class="mu-adv" style="color:${m.wr>0.5?'var(--green)':'var(--red)'}">${adv>0?'+':''}${adv}%</span></div>`;
      }).join('')}</div></div>`;
  }

  loading.style.display = 'none';
  grid.style.display = 'grid';
  grid.innerHTML = renderMU(best, 'Best') + renderMU(worst, 'Worst');
}

function closeModal(e) { if (e.target === document.getElementById('modal-overlay')) document.getElementById('modal-overlay').classList.remove('show'); }
document.addEventListener('keydown', e => { if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('show'); });

init();
</script>
